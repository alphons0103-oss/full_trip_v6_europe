let cur=0;

function buildTabs(){
  let html='';let lp=-1;
  days.forEach((d,i)=>{
    if(d.phase!==lp){html+=`<div class="section-label">${phaseNames[d.phase]}</div>`;lp=d.phase;}
    const col=phaseColors[d.phase];const active=i===cur;
    html+=`<div class="day-tab${active?' active':''}" onclick="go(${i})" style="border-left:3px solid ${active?col:'transparent'}">
      <span class="dnum" style="${active?'color:'+col:''}">${d.label}</span>
      <div><div class="dtitle">${d.title}</div><div class="dsub">${d.sub}</div></div>
    </div>`;
  });
  document.getElementById('tabs').innerHTML=html;
}

  const tc={'warn':'tip-warn','info':'tip-info','green':'tip-green','history':'tip-warn'}[d.tip.type];
  const ti={'warn':'💡','info':'ℹ️','green':'✅','history':'🏛️'}[d.tip.type];
  document.getElementById('detail').innerHTML=`
    <div class="dlabel" style="color:${col}">${phaseNames[d.phase]} · ${d.label}</div>
    <div class="dtitle2">${d.title}</div>
    <div class="ddate">${d.sub}</div>
    <div class="tip ${tc}"><span>${ti}</span><span>${d.tip.text}</span></div>
    <div class="stops">${d.stops.map(s=>`
      <div class="scard" style="border-left-color:${col}">
        <div class="stime">${s.time}</div>
        <div class="sname">${s.name}${s.isNew?'<span class="new-badge">新增</span>':''}</div>
        <div class="sdesc">${s.desc}</div>
        <span class="stag t-${s.isNew?'new':s.tag}">${s.isNew?'新加入':tagMap[s.tag]}</span>
      </div>`).join('')}
    </div>`;
}

function buildMap(){
  const phase=days[cur].phase;const col=phaseColors[phase];
  const pp=pts.filter(p=>p.phase===phase);
  document.getElementById('route').setAttribute('points',pp.map(p=>`${p.x},${p.y}`).join(' '));
  document.getElementById('route').setAttribute('stroke',col);
  document.getElementById('markers').innerHTML=pts.map(p=>{
    const on=p.phase===phase;
    const c=on?(p.isNew?'#3B6D11':phaseColors[p.phase]):'#9E9C96';
    const r=on?7:4.5;
    const lx=p.x>420?p.x-9:(p.x<60?p.x+10:p.x+11);
    const anchor=p.x>420?'end':'start';
    return`<g>
      <circle cx="${p.x}" cy="${p.y}" r="${r+5}" fill="${c}" opacity="${on?0.18:0}" class="${on?'pulse':''}"/>
      <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${c}" stroke="white" stroke-width="1.5"/>
      <text x="${lx}" y="${p.y+4}" font-size="9.5" font-family="DM Sans,sans-serif" font-weight="${on?500:400}" fill="${on?c:'#9E9C96'}" text-anchor="${anchor}">${p.name}</text>
    </g>`;
  }).join('');
}

function go(i){cur=i;buildTabs();buildDetail();buildMap();}
go(0);
</script>
